<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#07C160" />
    <meta name="description" content="Caleb - 智能对话助手" />

    <!-- PWA 相关配置 -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Caleb" />

    <!-- Apple 触摸图标 -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- Roboto 字体（MUI 推荐） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>Caleb</title>

    <!-- 防主题闪烁：在 React 加载前根据存储/系统偏好设置背景色，避免深色用户看到白屏 -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('color-mode');
          if (!m) {
            m = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.dataset.mode = m;
          document.documentElement.style.background =
            m === 'light' ? '#EDEDED' : '#111111';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
