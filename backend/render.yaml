# Render 部署配置
# 文档: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ai-chat-assistant-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MEMORY_TOKEN_THRESHOLD
        value: 4000
      - key: MEMORY_MESSAGE_THRESHOLD
        value: 20
      - key: KEEP_RECENT_MESSAGES
        value: 6
